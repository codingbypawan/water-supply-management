version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wsm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: water_supply_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wsm-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: water_supply_db
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:80}
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api/v1
    container_name: wsm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wsm-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '8080:80'

volumes:
  mysql_data:
